    - title: Support
      href: https://dash.aclclouds.com/tickets
  css: |
    :root {
      --body-background-color: #edf4ff;
      --body-text-color: #0f1b3d;
      --card-background-color: rgba(255, 255, 255, 0.94);
      --card-border-color: rgba(26, 86, 219, 0.12);
      --link-color: #1a56db;
      --acl-navy: #0f1b3d;
      --acl-blue: #1a56db;
      --acl-blue-2: #38bdf8;
      --acl-emerald: #10b981;
      --acl-muted: #5f708f;
      --acl-surface: rgba(255, 255, 255, 0.94);
      --acl-border: rgba(15, 27, 61, 0.1);
      --acl-shadow: 0 18px 50px rgba(15, 27, 61, 0.1);
    }

    * { box-sizing: border-box; }

    html {
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(180deg, #eef5ff 0%, #f7fbff 42%, #ffffff 100%) !important;
      color: var(--acl-navy) !important;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(15, 27, 61, 0.96) 0, rgba(15, 27, 61, 0.9) 315px, transparent 316px),
        linear-gradient(90deg, rgba(56, 189, 248, 0.08) 1px, transparent 1px),
        linear-gradient(180deg, rgba(26, 86, 219, 0.06) 1px, transparent 1px);
      background-size: auto, 46px 46px, 46px 46px;
    }

    a {
      color: var(--acl-blue);
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }

    nav {
      position: sticky !important;
      top: 0;
      z-index: 20;
      background: rgba(15, 27, 61, 0.9) !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.09) !important;
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      box-shadow: 0 14px 38px rgba(5, 12, 28, 0.22);
    }

    nav .container {
      max-width: 1180px !important;
      min-height: 72px;
    }

    nav a,
    nav li a,
    nav .logo,
    nav .logo div {
      color: #ffffff !important;
      text-decoration: none !important;
    }

    nav .logo {
      gap: 12px !important;
      font-weight: 900 !important;
      letter-spacing: 0;
    }

    nav .logo img {
      width: 38px !important;
      height: 38px !important;
      object-fit: contain;
      filter: drop-shadow(0 10px 18px rgba(56, 189, 248, 0.22));
    }

    nav ul {
      gap: 8px !important;
      align-items: center !important;
    }

    nav li a {
      display: inline-flex !important;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px !important;
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.78) !important;
      font-weight: 750 !important;
      transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }

    nav li a:hover,
    nav li a[aria-current="page"] {
      background: rgba(255, 255, 255, 0.12) !important;
      color: #ffffff !important;
      transform: translateY(-1px);
    }

    main.container {
      max-width: 1180px !important;
      padding: 34px 20px 54px !important;
    }

    main > header {
      position: relative;
      overflow: hidden;
      margin: 10px 0 24px;
      padding: clamp(28px, 5vw, 54px) clamp(22px, 5vw, 52px) !important;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(26, 86, 219, 0.95), rgba(15, 27, 61, 0.96) 56%, rgba(5, 12, 28, 0.98)) !important;
      box-shadow: 0 26px 70px rgba(5, 12, 28, 0.28);
    }

    main > header::after {
      content: "GitHub Pages - Surveillance 24/7";
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      margin-top: 22px;
      padding: 0 12px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.82);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1, h2, h3 {
      letter-spacing: 0 !important;
      color: var(--acl-navy) !important;
    }

    main > header h1 {
      max-width: 780px;
      margin: 0 !important;
      color: #ffffff !important;
      font-size: clamp(32px, 5vw, 58px) !important;
      line-height: 1.02 !important;
      font-weight: 900 !important;
    }

    main > header .lead,
    main > header p {
      max-width: 760px;
      margin-top: 18px !important;
      color: rgba(255, 255, 255, 0.82) !important;
      font-size: clamp(15px, 2vw, 18px) !important;
      line-height: 1.7 !important;
    }

    main > section,
    .live-status {
      margin: 18px 0 !important;
      padding: 20px !important;
      border: 1px solid var(--acl-border) !important;
      border-radius: 22px !important;
      background: var(--acl-surface) !important;
      box-shadow: var(--acl-shadow) !important;
    }

    .f.changed {
      margin: 26px 0 14px !important;
      padding: 18px 20px !important;
      border: 1px solid var(--acl-border) !important;
      border-radius: 22px !important;
      background: rgba(255, 255, 255, 0.78) !important;
      box-shadow: 0 12px 34px rgba(15, 27, 61, 0.07) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .f.changed h2 {
      margin: 0 !important;
      font-size: 0 !important;
      font-weight: 900 !important;
    }

    .f.changed h2::before {
      content: "État en direct";
      font-size: 20px !important;
      line-height: 1.2;
    }

    form label {
      border: 1px solid rgba(26, 86, 219, 0.12) !important;
      border-radius: 999px !important;
      background: #ffffff !important;
      color: var(--acl-muted) !important;
      font-weight: 800 !important;
      box-shadow: 0 1px 2px rgba(15, 27, 61, 0.04);
    }

    form input:checked + label {
      background: linear-gradient(135deg, var(--acl-blue), var(--acl-blue-2)) !important;
      border-color: transparent !important;
      color: #ffffff !important;
      box-shadow: 0 12px 24px rgba(26, 86, 219, 0.2);
    }

    #data_all + label {
      font-size: 0 !important;
    }

    #data_all + label::after {
      content: "Tout";
      font-size: 13px;
      line-height: 1;
    }

    table,
    .history-table,
    .response-time {
      overflow: hidden;
      border: 1px solid var(--acl-border) !important;
      border-radius: 18px !important;
      background: var(--acl-surface) !important;
      box-shadow: var(--acl-shadow) !important;
    }

    th {
      background: #f1f7ff !important;
      color: #506382 !important;
      font-size: 12px !important;
      font-weight: 900 !important;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    td,
    th {
      border-color: rgba(15, 27, 61, 0.08) !important;
    }

    tr {
      transition: background 0.16s ease;
    }

    tr:hover {
      background: rgba(26, 86, 219, 0.035) !important;
    }

    summary {
      color: var(--acl-navy) !important;
      font-weight: 800 !important;
    }

    details {
      border-radius: 14px !important;
    }

    img[src*="shields.io"] {
      filter: none !important;
      border-radius: 999px;
    }

    img[alt*="Response time graph"] {
      display: block;
      width: 100%;
      max-width: 760px;
      margin: 14px 0 4px;
      padding: 10px 12px;
      border: 1px solid var(--acl-border);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(238, 245, 255, 0.9), rgba(255, 255, 255, 0.9));
      box-shadow: 0 10px 28px rgba(15, 27, 61, 0.08);
      filter: saturate(1.08);
    }

    .loading,
    .loading svg {
      color: var(--acl-blue) !important;
      stroke: var(--acl-blue) !important;
    }

    footer {
      margin-top: 38px !important;
      padding: 26px 20px !important;
      background: #0f1b3d !important;
      border-top: 1px solid rgba(255, 255, 255, 0.08) !important;
      color: rgba(255, 255, 255, 0.7) !important;
    }

    footer a {
      color: #93c5fd !important;
      font-weight: 800;
    }

    footer p {
      margin: 0 !important;
      font-size: 0 !important;
      text-align: center;
    }

    footer p::before {
      content: "Page de statut ACLClouds hébergée par GitHub Pages et alimentée par Upptime.";
      color: rgba(255, 255, 255, 0.76);
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      nav .container { min-height: 64px; }
      nav ul {
        width: 100%;
        flex-wrap: wrap;
        justify-content: flex-start !important;
        padding-bottom: 12px;
      }
      main.container { padding: 20px 12px 38px !important; }
      main > header {
        border-radius: 22px;
        padding: 28px 20px !important;
      }
      main > section,
      .live-status,
      .f.changed {
        padding: 14px !important;
        border-radius: 18px !important;
      }
      table { font-size: 13px !important; }
    }
