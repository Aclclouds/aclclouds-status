status-website:
  cname: status.aclclouds.com
  logoUrl: https://skybots.tech/images/skybots.png
  logoHref: /
  favicon: https://skybots.tech/images/skybots.png
  name: ACLClouds Status
  theme: light
  introTitle: "Statut des services ACLClouds"
  introMessage: "Surveillance en temps réel du panel, des nodes d'hébergement, des services jeux et de l'infrastructure. Cette page est hébergée par GitHub Pages et reste indépendante de nos serveurs."
  navbar:
    - title: Statut
      href: /
