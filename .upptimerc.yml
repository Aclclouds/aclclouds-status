      color: var(--acl-muted);
      font-size: 13px;
      font-weight: 750;
      line-height: 1.45;
    }

    .acl-service-panel,
    .acl-outage-panel {
      padding: 22px;
      border-radius: 24px;
    }

    .acl-section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .acl-section-title {
      margin-top: 4px;
      color: var(--acl-ink);
      font-size: clamp(21px, 3vw, 29px);
      font-weight: 950;
      line-height: 1.1;
    }

    .acl-section-note {
      color: var(--acl-muted);
      font-size: 13px;
      font-weight: 760;
      text-align: right;
    }

    .acl-service-list {
      display: grid;
      gap: 10px;
    }

    .acl-service-row {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(300px, 0.9fr);
      gap: 18px;
      align-items: center;
      padding: 14px;
      border: 1px solid rgba(16, 32, 63, 0.08);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(248, 251, 255, 0.95), rgba(255, 255, 255, 0.97));
    }

    .acl-service-main {
      display: flex;
      min-width: 0;
      align-items: center;
      gap: 13px;
    }

    .acl-service-icon {
      display: grid;
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      place-items: center;
      border: 1px solid rgba(16, 32, 63, 0.08);
      border-radius: 13px;
      background: #ffffff;
      color: var(--acl-blue);
      font-size: 18px;
      font-weight: 950;
      box-shadow: 0 8px 22px rgba(16, 32, 63, 0.08);
    }

    .acl-service-name {
      overflow: hidden;
      color: var(--acl-ink);
      font-size: 15px;
      font-weight: 950;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .acl-service-meta {
      margin-top: 3px;
      overflow: hidden;
      color: var(--acl-muted);
      font-size: 12px;
      font-weight: 760;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .acl-service-side {
      display: grid;
      gap: 9px;
    }

    .acl-service-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 7px;
    }

    .acl-badge {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(35, 104, 232, 0.09);
      color: var(--acl-blue);
      font-size: 12px;
      font-weight: 920;
      white-space: nowrap;
    }

    .acl-badge-up {
      background: rgba(18, 185, 129, 0.14);
      color: #087a55;
    }

    .acl-badge-down {
      background: rgba(239, 68, 68, 0.14);
      color: #b4232e;
    }

    .acl-badge-degraded {
      background: rgba(245, 158, 11, 0.18);
      color: #965a00;
    }

    .acl-latency-track {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(16, 32, 63, 0.08);
    }

    .acl-latency-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--acl-green), var(--acl-cyan));
    }

    .acl-latency-fill[data-speed="slow"] {
      background: linear-gradient(90deg, var(--acl-amber), #f97316);
    }

    .acl-latency-fill[data-speed="bad"] {
      background: linear-gradient(90deg, var(--acl-red), #fb7185);
    }

    .acl-outage-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .acl-outage-item,
    .acl-empty-state {
      padding: 14px;
      border: 1px solid rgba(16, 32, 63, 0.08);
      border-radius: 16px;
      background: rgba(248, 251, 255, 0.86);
      color: var(--acl-muted);
      font-size: 13px;
      font-weight: 760;
      line-height: 1.5;
    }

    .acl-outage-item strong {
      display: block;
      color: var(--acl-ink);
      font-size: 14px;
      font-weight: 950;
    }

    .acl-private-note {
      margin-top: 12px;
      color: var(--acl-muted);
      font-size: 12px;
      font-weight: 730;
      line-height: 1.55;
    }

    footer {
      margin-top: 36px !important;
      padding: 28px 20px !important;
      border-top: 1px solid rgba(255, 255, 255, 0.08) !important;
      background: #0c1833 !important;
      color: rgba(255, 255, 255, 0.74) !important;
    }

    footer a {
      color: #9bdcff !important;
      font-weight: 850;
    }

    footer p {
      margin: 0 !important;
      font-size: 0 !important;
      text-align: center;
    }

    footer p::before {
      content: "Page de statut ACLClouds hébergée par GitHub Pages, surveillée par GitHub Actions et alimentée par Upptime.";
      color: rgba(255, 255, 255, 0.76);
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 820px) {
      .container {
        width: min(100% - 24px, 1180px) !important;
      }

      nav .container {
        min-height: auto;
        padding: 14px 0 !important;
        align-items: flex-start;
        flex-direction: column;
      }

      nav ul {
        width: 100%;
        flex-wrap: wrap;
        justify-content: flex-start !important;
      }

      main.container {
        padding-top: 22px !important;
        padding-bottom: 38px !important;
      }

      main > header {
        min-height: 0;
        border-radius: 22px;
        padding: 28px 20px !important;
      }

      .f.changed {
        align-items: flex-start;
        flex-direction: column;
        border-radius: 20px !important;
      }

      .f.changed form {
        width: 100%;
        justify-content: flex-start;
        border-radius: 18px;
      }

      .live-status {
        grid-template-columns: 1fr;
      }

      .acl-overall-card {
        grid-template-columns: 1fr;
        border-radius: 22px;
      }

      .acl-overall-pill {
        width: fit-content;
      }

      .acl-metric-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .acl-section-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .acl-section-note {
        text-align: left;
      }

      .acl-service-row {
        grid-template-columns: 1fr;
      }

      .acl-service-stats {
        justify-content: flex-start;
      }

      section,
      .live-status,
      .f.changed {
        padding: 14px !important;
        border-radius: 18px !important;
      }

      table {
        display: block;
        overflow-x: auto;
        font-size: 13px !important;
      }

      dl {
