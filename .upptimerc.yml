status-website:
  cname: status.aclclouds.com
  logoUrl: https://skybots.tech/images/skybots.png
  logoHref: /
  favicon: https://skybots.tech/images/skybots.png
  name: ACLClouds Status
  theme: light
  introTitle: "Statut des services ACLClouds"
  introMessage: "Surveillance en temps réel du panel, des nodes d'hébergement, des services jeux et de l'infrastructure. Cette page est hébergée par GitHub Pages et reste indépendante de nos serveurs."
  navbar:
    - title: Statut
      href: /
    - title: Panel
      href: https://dash.aclclouds.com
    - title: Site
      href: https://aclclouds.com
    - title: Support
      href: https://dash.aclclouds.com/tickets
  css: |
    :root {
      --body-background-color: #eef5ff;
      --body-text-color: #10203f;
      --card-background-color: rgba(255, 255, 255, 0.96);
      --card-border-color: rgba(24, 62, 136, 0.13);
      --link-color: #2368e8;
      --up-border-left-color: #12b981;
      --up-color-color: #0f7a58;
      --down-border-left-color: #ef4444;
      --down-color-color: #ad1f2c;
      --degraded-border-left-color: #f59e0b;
      --degraded-color-color: #9a5a00;
      --tag-up-background-color: rgba(18, 185, 129, 0.14);
      --tag-down-background-color: rgba(239, 68, 68, 0.14);
      --tag-degraded-background-color: rgba(245, 158, 11, 0.18);
      --change-background-color: rgba(35, 104, 232, 0.1);
      --graph-opacity: 1;
      --graph-filter: saturate(1.08);
      --acl-ink: #10203f;
      --acl-navy: #0c1833;
      --acl-blue: #2368e8;
      --acl-cyan: #23b7ef;
      --acl-green: #12b981;
      --acl-red: #ef4444;
      --acl-amber: #f59e0b;
      --acl-muted: #60708c;
      --acl-soft: #eef5ff;
      --acl-surface: rgba(255, 255, 255, 0.96);
      --acl-border: rgba(16, 32, 63, 0.11);
      --acl-shadow: 0 22px 60px rgba(16, 32, 63, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding-bottom: 0 !important;
      background:
        linear-gradient(180deg, rgba(10, 22, 48, 0.98) 0, rgba(13, 31, 70, 0.94) 330px, transparent 331px),
        linear-gradient(135deg, rgba(35, 104, 232, 0.16) 0, rgba(35, 183, 239, 0.08) 34%, transparent 60%),
        linear-gradient(180deg, #eef5ff 0%, #f8fbff 48%, #ffffff 100%) !important;
      color: var(--acl-ink) !important;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.055) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(180deg, #000 0, transparent 390px);
    }

    a {
      color: var(--acl-blue);
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }

    .container {
      width: min(1180px, calc(100% - 32px)) !important;
      max-width: none !important;
      padding-left: 0 !important;
      padding-right: 0 !important;
    }

    nav {
      position: sticky !important;
      top: 0;
      z-index: 30;
      background: rgba(10, 22, 48, 0.82) !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      box-shadow: 0 16px 42px rgba(4, 12, 30, 0.25);
    }

    nav .container {
      display: flex !important;
      min-height: 74px;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    nav a,
    nav li a,
    nav .logo,
    nav .logo div {
      color: #ffffff !important;
      text-decoration: none !important;
    }

    nav .logo {
      display: inline-flex !important;
      gap: 12px !important;
      align-items: center;
      font-weight: 900 !important;
      letter-spacing: 0 !important;
      white-space: nowrap;
    }

    nav .logo img {
      width: 40px !important;
      height: 40px !important;
      padding: 4px;
      object-fit: contain;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      filter: drop-shadow(0 10px 18px rgba(35, 183, 239, 0.22));
    }

    nav ul {
      display: flex !important;
      gap: 8px !important;
      align-items: center !important;
      justify-content: flex-end;
      margin: 0 !important;
      padding: 0 !important;
    }

    nav li {
      list-style: none;
    }

    nav li a {
      display: inline-flex !important;
      min-height: 38px;
      align-items: center;
      justify-content: center;
      padding: 0 14px !important;
      border: 1px solid transparent;
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.76) !important;
      font-weight: 800 !important;
      transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }

    nav li a:hover,
    nav li a[aria-current="page"] {
      background: rgba(255, 255, 255, 0.12) !important;
      border-color: rgba(255, 255, 255, 0.16);
      color: #ffffff !important;
      transform: translateY(-1px);
    }

    main.container {
      padding-top: 34px !important;
      padding-bottom: 58px !important;
    }

    main > header {
      position: relative;
      display: grid;
      min-height: 270px;
      margin: 10px 0 22px;
      padding: clamp(30px, 5vw, 56px) clamp(22px, 5vw, 54px) !important;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 30px;
      background:
        linear-gradient(135deg, rgba(35, 104, 232, 0.96), rgba(12, 24, 51, 0.97) 52%, rgba(5, 12, 28, 0.98)),
        linear-gradient(90deg, rgba(35, 183, 239, 0.14), transparent 48%) !important;
      box-shadow: 0 28px 72px rgba(4, 12, 30, 0.3);
    }

    main > header::before {
      content: "ACLClouds";
      position: absolute;
      right: clamp(18px, 5vw, 54px);
      bottom: -10px;
      color: rgba(255, 255, 255, 0.055);
      font-size: clamp(58px, 12vw, 136px);
      font-weight: 950;
      line-height: 0.8;
      letter-spacing: 0;
      pointer-events: none;
    }

    main > header::after {
      content: "Monitoring indépendant - GitHub Pages - 24/7";
      display: inline-flex;
      width: fit-content;
      min-height: 32px;
      align-items: center;
      margin-top: 24px;
      padding: 0 13px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.84);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      backdrop-filter: blur(10px);
    }

    h1,
    h2,
    h3,
    h4 {
      letter-spacing: 0 !important;
      color: var(--acl-ink) !important;
    }

    main > header h1 {
      max-width: 780px;
      margin: 0 !important;
      color: #ffffff !important;
      font-size: clamp(34px, 5vw, 62px) !important;
      line-height: 1.02 !important;
      font-weight: 950 !important;
    }

    main > header .lead,
    main > header p {
      max-width: 760px;
      margin-top: 18px !important;
      color: rgba(255, 255, 255, 0.83) !important;
      font-size: clamp(15px, 2vw, 18px) !important;
      line-height: 1.7 !important;
    }

    section,
    .live-status,
    .f.changed {
      margin: 18px 0 !important;
      border: 1px solid var(--acl-border) !important;
      border-radius: 24px !important;
      background: var(--acl-surface) !important;
      box-shadow: var(--acl-shadow) !important;
    }

    section,
    .live-status {
      padding: 20px !important;
    }

    section:empty {
      display: none;
    }

    .f.changed {
      display: flex !important;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 28px !important;
      padding: 16px 18px !important;
      background: rgba(255, 255, 255, 0.82) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .f.changed h2 {
      margin: 0 !important;
      color: var(--acl-ink) !important;
      font-size: clamp(20px, 3vw, 28px) !important;
      line-height: 1.15 !important;
      font-weight: 950 !important;
    }

    .f.changed h2::after {
      content: "Tous les services critiques, nodes Wings, nodes jeux et accès panel";
      display: block;
      margin-top: 5px;
      color: var(--acl-muted);
      font-size: 13px;
      font-weight: 700;
    }

    .f.changed form {
      display: inline-flex !important;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 7px !important;
      padding: 5px;
      border: 1px solid rgba(16, 32, 63, 0.08);
      border-radius: 999px;
      background: rgba(239, 245, 255, 0.76);
    }

    .f.changed input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .f.changed label {
      display: inline-flex !important;
      min-height: 34px;
      align-items: center;
      justify-content: center;
      padding: 0 12px !important;
      border: 1px solid transparent !important;
      border-radius: 999px !important;
      background: transparent !important;
      color: var(--acl-muted) !important;
      font-size: 13px;
      font-weight: 850 !important;
      cursor: pointer;
      transition: background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .f.changed input:checked + label {
      background: linear-gradient(135deg, var(--acl-blue), var(--acl-cyan)) !important;
      color: #ffffff !important;
      box-shadow: 0 12px 24px rgba(35, 104, 232, 0.22);
    }

    .f.changed label:hover {
      color: var(--acl-blue) !important;
      transform: translateY(-1px);
    }

    #data_day + label {
      font-size: 0 !important;
    }

    #data_day + label::after {
      content: "24 h";
      font-size: 13px;
    }

    #data_week + label {
      font-size: 0 !important;
    }

    #data_week + label::after {
      content: "7 j";
      font-size: 13px;
    }

    #data_month + label {
      font-size: 0 !important;
    }

    #data_month + label::after {
      content: "30 j";
      font-size: 13px;
    }

    #data_year + label {
      font-size: 0 !important;
    }

    #data_year + label::after {
      content: "1 an";
      font-size: 13px;
    }

    #data_all + label {
      font-size: 0 !important;
    }

    #data_all + label::after {
      content: "Tout";
      font-size: 13px;
    }

    .live-status {
      display: grid !important;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px !important;
    }

    article {
      position: relative;
      overflow: hidden;
      padding: 18px !important;
      border: 1px solid var(--acl-border) !important;
      border-radius: 20px !important;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 251, 255, 0.95)) !important;
      box-shadow: 0 10px 30px rgba(16, 32, 63, 0.08);
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    article + article {
      margin-top: 0 !important;
    }

    article:hover {
      border-color: rgba(35, 104, 232, 0.25) !important;
      box-shadow: 0 18px 42px rgba(16, 32, 63, 0.13);
      transform: translateY(-2px);
    }

    article.up {
      border-left: 4px solid var(--acl-green) !important;
    }

    article.down {
      border-left: 4px solid var(--acl-red) !important;
    }

    article.degraded {
      border-left: 4px solid var(--acl-amber) !important;
    }

    article.down-active,
    article.degraded-active {
      background: linear-gradient(180deg, #fff8f7, #ffffff) !important;
    }

    article.graph::after {
      content: "";
      position: absolute;
      right: -10px;
      bottom: -6px;
      width: 58%;
      height: 72px;
      pointer-events: none;
      background-image: var(--background);
      background-repeat: no-repeat;
      background-position: right bottom;
      background-size: contain;
      opacity: 0.34;
      filter: saturate(1.12);
    }

    article h4 {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 14px !important;
      color: var(--acl-ink) !important;
      font-size: 16px !important;
      font-weight: 950 !important;
      line-height: 1.25 !important;
    }

    article h4 a {
      color: var(--acl-ink) !important;
      text-decoration: none !important;
    }

    article h4 a:hover {
      color: var(--acl-blue) !important;
    }

    article img.icon {
      width: 34px !important;
      height: 34px !important;
      padding: 5px;
      border: 1px solid rgba(16, 32, 63, 0.08);
      border-radius: 10px;
      background: #ffffff;
      object-fit: contain;
      box-shadow: 0 8px 18px rgba(16, 32, 63, 0.08);
    }

    article div,
    article p {
      position: relative;
      z-index: 1;
      color: var(--acl-muted);
      font-weight: 650;
    }

    .data {
      display: inline-flex !important;
      min-height: 30px;
      align-items: center;
      justify-content: center;
      margin: 0 4px;
      padding: 0 10px !important;
      border-radius: 999px;
      background: rgba(35, 104, 232, 0.1) !important;
      color: var(--acl-blue) !important;
      font-size: 13px;
      font-weight: 950 !important;
    }

    .tag {
      display: inline-flex !important;
      min-height: 24px;
      align-items: center;
      margin-left: 8px;
      padding: 0 8px !important;
      border-radius: 999px !important;
      font-size: 11px !important;
      font-weight: 950 !important;
      text-transform: uppercase;
    }

    .tag.up,
    article.up .tag,
    article.up > span {
      color: #087a55 !important;
      background: rgba(18, 185, 129, 0.14) !important;
    }

    .tag.down,
    article.down .tag,
    article.down > span {
      color: #b4232e !important;
      background: rgba(239, 68, 68, 0.14) !important;
    }

    .tag.degraded,
    article.degraded .tag,
    article.degraded > span {
      color: #9a5a00 !important;
      background: rgba(245, 158, 11, 0.18) !important;
    }

    article.up:first-child {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #087a55 !important;
      font-size: 16px;
      font-weight: 950;
      background:
        linear-gradient(135deg, rgba(18, 185, 129, 0.13), rgba(35, 183, 239, 0.08)),
        #ffffff !important;
    }

    section > h2,
    section h2 {
      margin: 0 0 14px !important;
      color: var(--acl-ink) !important;
      font-size: 22px !important;
      font-weight: 950 !important;
    }

    section > h3,
    section h3 {
      margin: 18px 0 10px !important;
      color: var(--acl-muted) !important;
      font-size: 13px !important;
      font-weight: 900 !important;
      letter-spacing: 0.04em !important;
      text-transform: uppercase;
    }

    dl {
      display: grid;
      grid-template-columns: minmax(140px, 0.55fr) 1fr;
      gap: 8px 14px;
      margin: 14px 0 0 !important;
      padding: 14px;
      border: 1px solid rgba(16, 32, 63, 0.08);
      border-radius: 16px;
      background: rgba(239, 245, 255, 0.58);
    }

    dl dt {
      color: var(--acl-muted);
      font-weight: 900 !important;
    }

    dl dd {
      margin: 0 !important;
      color: var(--acl-ink);
      font-weight: 800;
    }

    table,
    .history-table,
    .response-time {
      width: 100%;
      overflow: hidden;
      border: 1px solid var(--acl-border) !important;
      border-radius: 18px !important;
      background: var(--acl-surface) !important;
      box-shadow: var(--acl-shadow) !important;
      border-collapse: separate !important;
      border-spacing: 0 !important;
    }

    th {
      background: #eef5ff !important;
      color: #52647f !important;
      font-size: 12px !important;
      font-weight: 950 !important;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    td,
    th {
      padding: 12px 14px !important;
      border-color: rgba(16, 32, 63, 0.08) !important;
    }

    tr {
      transition: background 0.16s ease;
    }

    tr:hover {
      background: rgba(35, 104, 232, 0.035) !important;
    }

    summary {
      color: var(--acl-ink) !important;
      font-weight: 850 !important;
      cursor: pointer;
    }

    details {
      border-radius: 14px !important;
    }

    img[src*="shields.io"] {
      filter: none !important;
      border-radius: 999px;
    }

    img[alt*="Response time graph"] {
      display: block;
      width: 100%;
      max-width: 760px;
      margin: 14px 0 4px;
      padding: 10px 12px;
      border: 1px solid var(--acl-border);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(238, 245, 255, 0.9), rgba(255, 255, 255, 0.9));
      box-shadow: 0 10px 28px rgba(16, 32, 63, 0.08);
      filter: saturate(1.08);
    }

    .loading {
      display: grid !important;
      min-height: 86px;
      place-items: center;
      color: var(--acl-blue) !important;
    }

    .loading::after {
      content: "Chargement des données...";
      display: block;
      margin-left: 12px;
      color: var(--acl-muted);
      font-size: 14px;
      font-weight: 800;
    }

    .loading svg {
      color: var(--acl-blue) !important;
      stroke: var(--acl-blue) !important;
    }

    a.error-button,
    .submit-button {
      display: inline-flex !important;
      min-height: 40px;
      align-items: center;
      justify-content: center;
      padding: 0 16px !important;
      border: 0 !important;
      border-radius: 999px !important;
      background: linear-gradient(135deg, var(--acl-blue), var(--acl-cyan)) !important;
      color: #ffffff !important;
      font-weight: 900 !important;
      text-decoration: none !important;
      box-shadow: 0 12px 24px rgba(35, 104, 232, 0.22);
    }

    .acl-status-overview {
      display: grid;
      gap: 18px;
      padding: 0 !important;
      border: 0 !important;
      background: transparent !important;
      box-shadow: none !important;
    }

    .acl-overall-card,
    .acl-metric-card,
    .acl-service-panel,
    .acl-outage-panel {
      border: 1px solid var(--acl-border);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--acl-shadow);
    }

    .acl-overall-card {
      position: relative;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 22px;
      align-items: center;
      overflow: hidden;
      padding: clamp(22px, 4vw, 34px);
      border-radius: 26px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(239, 245, 255, 0.92)),
        radial-gradient(circle at 92% 12%, rgba(35, 183, 239, 0.16), transparent 34%);
    }

    .acl-overall-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      background: var(--acl-green);
    }

    .acl-overall-card[data-state="down"]::before {
      background: var(--acl-red);
    }

    .acl-overall-card[data-state="degraded"]::before {
      background: var(--acl-amber);
    }

    .acl-overall-eyebrow,
    .acl-card-label,
    .acl-section-kicker {
