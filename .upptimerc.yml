  js: |
    (function () {
      const SUMMARY_URLS = [
        "/history/summary.json",
        "https://raw.githubusercontent.com/Aclclouds/aclclouds-status/master/history/summary.json"
      ];
      const HISTORY_BASE_URLS = [
        "/history/",
        "https://raw.githubusercontent.com/Aclclouds/aclclouds-status/master/history/"
      ];
      const STATUS_LABELS = {
        up: "En ligne",
        down: "Hors ligne",
        degraded: "Dégradé"
      };

      const formatPercentNumber = (value) => {
        const number = Number(String(value || "0").replace("%", ""));
        return Number.isFinite(number) ? number : 0;
      };

      const formatPercent = (value) => `${formatPercentNumber(value).toFixed(2)} %`;
      const formatMs = (value) => `${Math.round(Number(value) || 0)} ms`;
      const average = (values) => {
        const valid = values.map(Number).filter(Number.isFinite);
        return valid.length ? valid.reduce((sum, value) => sum + value, 0) / valid.length : 0;
      };
      const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[char]);
      const formatDate = (value) => {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "date inconnue";
        return date.toLocaleString("fr-FR", {
          day: "2-digit",
          month: "long",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        });
      };
      const formatDay = (value) => {
        const date = new Date(`${value}T12:00:00`);
        if (Number.isNaN(date.getTime())) return value;
        return date.toLocaleDateString("fr-FR", {
          day: "2-digit",
          month: "long",
          year: "numeric"
        });
      };
      const classifySpeed = (time) => {
        const ms = Number(time) || 0;
        if (ms > 1500) return "bad";
        if (ms > 800) return "slow";
        return "good";
      };
      const serviceInitial = (name) => {
        const clean = String(name || "S").replace(/\(.+?\)/g, "").trim();
        return escapeHtml(clean.slice(0, 1).toUpperCase() || "S");
      };

      async function fetchFirst(urls) {
        let lastError;
        for (const url of urls) {
          try {
            const response = await fetch(`${url}${url.includes("?") ? "&" : "?"}v=${Date.now()}`, { cache: "no-store" });
            if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
            return await response.json();
          } catch (error) {
            lastError = error;
          }
        }
        throw lastError || new Error("Aucune source disponible");
      }

      async function fetchLastChecks(services) {
        const entries = await Promise.allSettled(services.map(async (service) => {
          for (const base of HISTORY_BASE_URLS) {
            try {
              const response = await fetch(`${base}${service.slug}.yml?v=${Date.now()}`, { cache: "no-store" });
              if (!response.ok) continue;
              const text = await response.text();
              const lastUpdated = text.match(/lastUpdated:\s*([^\n]+)/);
              const responseTime = text.match(/responseTime:\s*([0-9]+)/);
              return [service.slug, {
                lastUpdated: lastUpdated ? lastUpdated[1].trim() : null,
                responseTime: responseTime ? Number(responseTime[1]) : null
              }];
            } catch (error) {
              // Try next source.
            }
          }
          return [service.slug, null];
        }));

        return Object.fromEntries(entries
          .filter((entry) => entry.status === "fulfilled" && entry.value)
          .map((entry) => entry.value));
      }

      function collectOutages(services) {
        return services.flatMap((service) => Object.entries(service.dailyMinutesDown || {}).map(([date, minutes]) => ({
          service: service.name,
          date,
          minutes: Number(minutes) || 0
        }))).filter((item) => item.minutes > 0)
          .sort((a, b) => new Date(b.date) - new Date(a.date))
          .slice(0, 8);
      }

      function renderOverview(services, checks) {
        if (!services.length) return "";

        const down = services.filter((service) => service.status === "down").length;
        const degraded = services.filter((service) => service.status === "degraded").length;
        const up = services.length - down - degraded;
        const state = down ? "down" : degraded ? "degraded" : "up";
        const globalUptime = average(services.map((service) => formatPercentNumber(service.uptimeMonth || service.uptime)));
        const averageLatency = average(services.map((service) => service.time));
        const slowest = [...services].sort((a, b) => (Number(b.time) || 0) - (Number(a.time) || 0))[0];
        const lastCheckDates = Object.values(checks || {}).map((check) => check && check.lastUpdated).filter(Boolean);
        const lastCheck = lastCheckDates.length
          ? new Date(Math.max(...lastCheckDates.map((date) => new Date(date).getTime())))
          : null;
        const title = state === "up"
          ? "Tous les systèmes sont opérationnels"
          : state === "down"
            ? `${down} service${down > 1 ? "s" : ""} hors ligne`
            : `${degraded} service${degraded > 1 ? "s" : ""} dégradé`;
        const copy = state === "up"
          ? "Le panel, les nodes Wings, les nodes jeux et l'infrastructure répondent correctement sur la dernière série de contrôles."
          : "Une anomalie est détectée sur la dernière série de contrôles. Les détails par service sont disponibles ci-dessous.";

        return `
          <section class="acl-status-overview" aria-label="Synthèse du statut ACLClouds">
            <div class="acl-overall-card" data-state="${state}">
              <div>
                <div class="acl-overall-eyebrow">Statut global</div>
                <div class="acl-overall-title">${escapeHtml(title)}</div>
                <div class="acl-overall-copy">${escapeHtml(copy)}</div>
                <div class="acl-private-note">Données générées par GitHub Actions toutes les quelques minutes. Les métriques restent disponibles depuis la page publiée, même si le dépôt source est rendu privé ensuite.</div>
              </div>
              <div class="acl-overall-pill"><span class="acl-status-dot"></span>${escapeHtml(STATUS_LABELS[state])}</div>
            </div>
            <div class="acl-metric-grid">
              <div class="acl-metric-card">
                <div class="acl-card-label">Disponibilité 30 j</div>
                <div class="acl-card-value">${globalUptime.toFixed(2)} %</div>
                <div class="acl-card-helper">Moyenne de tous les services surveillés.</div>
              </div>
              <div class="acl-metric-card">
                <div class="acl-card-label">Latence moyenne</div>
                <div class="acl-card-value">${formatMs(averageLatency)}</div>
                <div class="acl-card-helper">Temps de réponse moyen sur le dernier contrôle.</div>
              </div>
              <div class="acl-metric-card">
                <div class="acl-card-label">Services en ligne</div>
                <div class="acl-card-value">${up}/${services.length}</div>
                <div class="acl-card-helper">${down ? `${down} hors ligne` : "Aucun service hors ligne"}${degraded ? `, ${degraded} dégradé` : ""}.</div>
              </div>
              <div class="acl-metric-card">
                <div class="acl-card-label">Dernière vérification</div>
                <div class="acl-card-value">${lastCheck ? lastCheck.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" }) : "—"}</div>
                <div class="acl-card-helper">${lastCheck ? formatDate(lastCheck) : "En attente du prochain check."}${slowest ? ` Plus lent : ${escapeHtml(slowest.name)} (${formatMs(slowest.time)}).` : ""}</div>
              </div>
            </div>
          </section>
        `;
      }

      function renderServices(services, checks) {
        const rows = services.map((service) => {
          const check = checks[service.slug] || {};
          const lastUpdated = check.lastUpdated ? formatDate(check.lastUpdated) : "Dernière vérification en cours";
          const latency = Number(check.responseTime || service.time || 0);
          const width = Math.max(8, Math.min(100, Math.round((latency / 2200) * 100)));
          const statusClass = service.status === "down" ? "acl-badge-down" : service.status === "degraded" ? "acl-badge-degraded" : "acl-badge-up";
          return `
            <div class="acl-service-row">
              <div class="acl-service-main">
                <div class="acl-service-icon">${serviceInitial(service.name)}</div>
                <div>
                  <div class="acl-service-name">${escapeHtml(service.name)}</div>
                  <div class="acl-service-meta">${escapeHtml(service.url)} · ${lastUpdated}</div>
                </div>
              </div>
              <div class="acl-service-side">
                <div class="acl-service-stats">
                  <span class="acl-badge ${statusClass}"><span class="acl-status-dot"></span>${escapeHtml(STATUS_LABELS[service.status] || service.status)}</span>
                  <span class="acl-badge">${formatPercent(service.uptimeDay)} sur 24 h</span>
                  <span class="acl-badge">${formatPercent(service.uptimeWeek)} sur 7 j</span>
                  <span class="acl-badge">${formatMs(latency)}</span>
                </div>
                <div class="acl-latency-track" aria-label="Latence ${formatMs(latency)}">
                  <div class="acl-latency-fill" data-speed="${classifySpeed(latency)}" style="width:${width}%"></div>
                </div>
              </div>
            </div>
          `;
        }).join("");

        return `
          <section class="acl-service-panel">
            <div class="acl-section-head">
              <div>
                <div class="acl-section-kicker">Moniteurs</div>
                <div class="acl-section-title">Services surveillés</div>
              </div>
              <div class="acl-section-note">Uptime, latence et dernière vérification en lecture directe des checks.</div>
            </div>
            <div class="acl-service-list">${rows}</div>
          </section>
        `;
      }

      function renderOutages(services) {
        const outages = collectOutages(services);
        const content = outages.length
          ? `<ul class="acl-outage-list">${outages.map((outage) => `
              <li class="acl-outage-item">
                <strong>${escapeHtml(outage.service)}</strong>
                ${formatDay(outage.date)} · ${outage.minutes} minute${outage.minutes > 1 ? "s" : ""} d'indisponibilité détectée
              </li>
            `).join("")}</ul>`
          : `<div class="acl-empty-state">Aucune coupure détectée dans les données actuellement publiées. Les prochaines interruptions apparaîtront ici avec la date et la durée.</div>`;

        return `
          <section class="acl-outage-panel">
            <div class="acl-section-head">
              <div>
                <div class="acl-section-kicker">Historique</div>
                <div class="acl-section-title">Coupures récentes</div>
              </div>
              <div class="acl-section-note">Dates et durées calculées depuis les minutes d'arrêt Upptime.</div>
            </div>
            ${content}
          </section>
        `;
      }

      async function boot() {
        if (document.querySelector(".acl-status-overview")) return;
        const main = document.querySelector("main.container") || document.querySelector("main");
        const header = main && main.querySelector("header");
        if (!main || !header) return;

        try {
          const services = await fetchFirst(SUMMARY_URLS);
          const checks = await fetchLastChecks(services);
          const wrapper = document.createElement("div");
          wrapper.className = "acl-status-suite";
          wrapper.innerHTML = renderOverview(services, checks) + renderServices(services, checks) + renderOutages(services);
          header.insertAdjacentElement("afterend", wrapper);
        } catch (error) {
          const fallback = document.createElement("section");
          fallback.className = "acl-outage-panel";
          fallback.innerHTML = '<div class="acl-section-title">Statut en cours de chargement</div><div class="acl-empty-state">Impossible de charger la synthèse avancée pour le moment. La liste Upptime classique reste disponible ci-dessous.</div>';
          header.insertAdjacentElement("afterend", fallback);
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", boot);
      } else {
        boot();
      }
    })();

